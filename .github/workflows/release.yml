name: release

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build linux/amd64 static binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags '-s -w' -o dist/opkssh-plugin-google-workspace_linux_amd64 ./cmd/opkssh-plugin-google-workspace
          cd dist
          sha256sum opkssh-plugin-google-workspace_linux_amd64 > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: opkssh-plugin-google-workspace_linux_amd64
          path: |
            dist/opkssh-plugin-google-workspace_linux_amd64
            dist/SHA256SUMS
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/opkssh-plugin-google-workspace_linux_amd64
            dist/SHA256SUMS
